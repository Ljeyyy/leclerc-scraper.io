<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlcoScore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(10,14,26,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.07); }
        .card { transition: transform 0.15s, border-color 0.15s; }
        .card:hover { transform: translateY(-3px); border-color: #eab308 !important; }
        .gold { border: 2px solid #eab308; box-shadow: 0 0 24px rgba(234,179,8,0.12); }
        .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        select { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 12px; outline: none; cursor: pointer; }
        select:focus { border-color: #eab308; }
        .badge-bières      { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .badge-vins-rouges { background: rgba(239,68,68,0.15);  color: #f87171; }
        .badge-vins-blancs { background: rgba(250,204,21,0.15); color: #fde047; }
        .badge-vins-rosés  { background: rgba(236,72,153,0.15); color: #f472b6; }
        .badge-spiritueux  { background: rgba(139,92,246,0.15); color: #a78bfa; }
        .badge-champagnes  { background: rgba(56,189,248,0.15); color: #38bdf8; }
        .stat-box { background: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 16px; }
        .sub-btn { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); color: #a78bfa; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
        .sub-btn:hover, .sub-btn.active { background: rgba(139,92,246,0.4); color: white; }
    </style>
</head>
<body class="text-gray-200 pb-36">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 glass p-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-lg font-black italic uppercase tracking-widest text-white">
                    🍾 Alco<span class="text-yellow-400">Score</span>
                </h1>
                <div id="stats-count" class="text-xs text-gray-500 font-mono"></div>
            </div>

            <input type="text" id="search" oninput="render()" placeholder="🔍 Rechercher... (ex: vodka, vin rouge, Absolut...)"
                class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-yellow-500 outline-none mb-3">

            <div class="flex flex-wrap gap-2 items-center mb-2">
                <div id="catFilters" class="flex gap-2 overflow-x-auto no-scrollbar flex-1"></div>
                <select id="sort" onchange="render()">
                    <option value="ratio_asc">💰 Meilleur ratio</option>
                    <option value="prix_asc">Prix ↑</option>
                    <option value="prix_desc">Prix ↓</option>
                    <option value="degre_desc">Degré ↓</option>
                </select>
                <select id="maxprix" onchange="render()">
                    <option value="9999">Tous prix</option>
                    <option value="5">Max 5€</option>
                    <option value="10">Max 10€</option>
                    <option value="20">Max 20€</option>
                    <option value="50">Max 50€</option>
                </select>
            </div>

            <!-- Sous-filtres spiritueux -->
            <div id="subFilters" class="hidden flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
        </div>
    </header>

    <!-- BARRE VS -->
    <div id="vs-bar" class="fixed bottom-0 inset-x-0 bg-yellow-500 p-4 text-black hidden z-[100]">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center gap-3 mb-2">
                <div class="flex-1 min-w-0">
                    <div class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Produit A</div>
                    <div id="vs1-name" class="text-xs font-black truncate">—</div>
                    <div id="vs1-ratio" class="text-xl font-black leading-none">—</div>
                </div>
                <div class="text-2xl font-black italic opacity-40">VS</div>
                <div class="flex-1 min-w-0 text-right">
                    <div class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Produit B</div>
                    <div id="vs2-name" class="text-xs font-black truncate">—</div>
                    <div id="vs2-ratio" class="text-xl font-black leading-none">—</div>
                </div>
                <button onclick="resetVS()" class="bg-black text-white w-7 h-7 rounded-full text-xs flex-shrink-0 ml-2">✕</button>
            </div>
            <div id="vs-winner" class="text-center font-black text-sm bg-black text-yellow-400 py-2 px-4 rounded-xl">
                Sélectionnez un 2ème produit en cliquant sur une carte
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4">
        <!-- STATS -->
        <div id="stats-bar" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8"></div>

        <!-- PODIUMS -->
        <div id="podiums" class="mb-8"></div>

        <!-- GRILLE -->
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-yellow-500 font-black uppercase text-xs tracking-widest">Toutes les références</h2>
            <span id="grid-count" class="text-xs text-gray-600 font-mono"></span>
        </div>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
    </main>

<script>
let db = [], filter = 'all', subFilter = null, vsSelection = [];

const EMOJIS = {
    'bières': '🍺', 'vins-rouges': '🍷', 'vins-blancs': '🥂',
    'vins-rosés': '🌸', 'spiritueux': '🥃', 'champagnes': '🍾'
};

const SOUS_CATS = ['vodka','rhum','whisky','gin','tequila','cognac','anisé','liqueur','autres'];

const SOUS_EMOJIS = {
    'vodka':'🫙', 'rhum':'🏝️', 'whisky':'🥃', 'gin':'🌿',
    'tequila':'🌵', 'cognac':'🍂', 'anisé':'⭐', 'liqueur':'🍬', 'autres':'🔮'
};

function getSousCategorie(nom) {
    const n = nom.toLowerCase();
    if (n.includes('vodka')) return 'vodka';
    if (n.includes('rhum') || n.includes('rum')) return 'rhum';
    if (n.includes('whisky') || n.includes('whiskey') || n.includes('bourbon') || n.includes('scotch')) return 'whisky';
    if (n.includes('gin')) return 'gin';
    if (n.includes('tequila') || n.includes('mezcal')) return 'tequila';
    if (n.includes('cognac') || n.includes('armagnac') || n.includes('calvados') || n.includes('brandy')) return 'cognac';
    if (n.includes('pastis') || n.includes('ricard') || n.includes('anisé') || n.includes('anis') || n.includes('sambuca') || n.includes('pastis')) return 'anisé';
    if (n.includes('liqueur') || n.includes('crème') || n.includes('amaretto') || n.includes('baileys') || n.includes('cointreau')) return 'liqueur';
    return 'autres';
}

fetch('alcools.json').then(r => r.json()).then(data => {

    // Degrés par défaut pour les produits sans degre_pct
    const DEFAULT_DEGRE = {
        'anisé':   45,
        'vodka':   40,
        'gin':     40,
        'tequila': 38,
        'rhum':    40,
        'whisky':  40,
        'cognac':  40,
        'liqueur': 20,
    };

    data.forEach(p => {
        if (!p.ratio && p.prix_eur && p.volume_L) {
            const sous = getSousCategorie(p.nom);
            const degre = p.degre_pct || DEFAULT_DEGRE[sous];
            if (degre) {
                p.degre_pct = p.degre_pct || degre;
                p.ratio = Math.round(p.prix_eur / (p.volume_L * degre / 100) * 100) / 100;
                p.ratio_estime = true;
            }
        }
    });

    db = data;
    const cats = [...new Set(db.map(p => p.categorie))];
    const cf = document.getElementById('catFilters');

    // Bouton TOUT
    const btnAll = document.createElement('button');
    btnAll.className = "px-4 py-1.5 bg-yellow-500 text-black rounded-full whitespace-nowrap font-bold text-[10px]";
    btnAll.id = "btn-all";
    btnAll.innerText = "TOUT";
    btnAll.onclick = () => setCat('all');
    cf.appendChild(btnAll);

    // Boutons catégories
    cats.forEach(c => {
        const b = document.createElement('button');
        b.className = "px-4 py-1.5 bg-slate-800 border border-slate-700 rounded-full whitespace-nowrap text-gray-400 font-bold text-[10px] cat-btn";
        b.id = "btn-" + c;
        b.innerText = (EMOJIS[c] || '') + ' ' + c.toUpperCase();
        b.onclick = () => setCat(c);
        cf.appendChild(b);
    });

    // Stats globales
    const withRatio = db.filter(p => p.ratio).sort((a,b) => a.ratio - b.ratio);
    const best = withRatio[0];
    document.getElementById('stats-bar').innerHTML = `
        <div class="stat-box"><div class="text-[10px] text-gray-500 uppercase mb-1">Total produits</div><div class="text-2xl font-black text-white">${db.length}</div></div>
        <div class="stat-box"><div class="text-[10px] text-gray-500 uppercase mb-1">Avec ratio</div><div class="text-2xl font-black text-green-400">${withRatio.length}</div></div>
        <div class="stat-box"><div class="text-[10px] text-gray-500 uppercase mb-1">Meilleur ratio</div><div class="text-2xl font-black text-yellow-400">${best ? best.ratio + '€/L' : '—'}</div></div>
        <div class="stat-box"><div class="text-[10px] text-gray-500 uppercase mb-1">Meilleur produit</div><div class="text-xs font-black text-white mt-1 leading-tight">${best ? best.nom.substring(0,35) + '...' : '—'}</div></div>
    `;

    render();
});

function setCat(c) {
    filter = c;
    subFilter = null;

    // Highlight bouton actif
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = "px-4 py-1.5 bg-slate-800 border border-slate-700 rounded-full whitespace-nowrap text-gray-400 font-bold text-[10px] cat-btn";
    });
    const btnAll = document.getElementById('btn-all');
    if (c === 'all') {
        btnAll.className = "px-4 py-1.5 bg-yellow-500 text-black rounded-full whitespace-nowrap font-bold text-[10px]";
    } else {
        btnAll.className = "px-4 py-1.5 bg-slate-800 border border-slate-700 rounded-full whitespace-nowrap text-gray-400 font-bold text-[10px]";
        const active = document.getElementById('btn-' + c);
        if (active) active.className = "px-4 py-1.5 bg-yellow-500 text-black rounded-full whitespace-nowrap font-bold text-[10px] cat-btn";
    }

    // Sous-filtres spiritueux
    const subBar = document.getElementById('subFilters');
    subBar.innerHTML = '';
    if (c === 'spiritueux') {
        subBar.classList.remove('hidden');
        SOUS_CATS.forEach(s => {
            const count = db.filter(p => p.categorie === 'spiritueux' && getSousCategorie(p.nom) === s).length;
            const b = document.createElement('button');
            b.className = "sub-btn";
            b.id = "sub-" + s;
            b.innerText = SOUS_EMOJIS[s] + ' ' + s.toUpperCase() + ' (' + count + ')';
            b.onclick = () => setSubFilter(s);
            subBar.appendChild(b);
        });
    } else {
        subBar.classList.add('hidden');
    }

    render();
}

function setSubFilter(s) {
    subFilter = subFilter === s ? null : s;
    document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
    if (subFilter) document.getElementById('sub-' + s)?.classList.add('active');
    render();
}

function render() {
    const s = document.getElementById('search').value.toLowerCase().replace(/\s+/g, '-');
    const sRaw = document.getElementById('search').value.toLowerCase();
    const sort = document.getElementById('sort').value;
    const maxprix = parseFloat(document.getElementById('maxprix').value) || 9999;

    let list = db.filter(p =>
        (filter === 'all' || p.categorie === filter) &&
        (!subFilter || getSousCategorie(p.nom) === subFilter) &&
        (p.nom.toLowerCase().includes(sRaw) || p.categorie.toLowerCase().includes(s)) &&
        (p.prix_eur === null || p.prix_eur <= maxprix)
    );

    if (sort === 'ratio_asc')  list.sort((a,b) => (a.ratio||99999) - (b.ratio||99999));
    if (sort === 'prix_asc')   list.sort((a,b) => (a.prix_eur||99999) - (b.prix_eur||99999));
    if (sort === 'prix_desc')  list.sort((a,b) => (b.prix_eur||0) - (a.prix_eur||0));
    if (sort === 'degre_desc') list.sort((a,b) => (b.degre_pct||0) - (a.degre_pct||0));

    document.getElementById('stats-count').innerText = list.length + ' produits';
    document.getElementById('grid-count').innerText = Math.min(list.length, 300) + ' affichés';

    // Podiums
    const pods = document.getElementById('podiums');
    pods.innerHTML = '';
    if (filter === 'all' && !sRaw) {
        const cats = [...new Set(db.map(p => p.categorie))];
        let html = '<h2 class="text-yellow-500 font-black uppercase text-xs tracking-widest mb-4">🏆 Meilleur rapport par catégorie</h2><div class="grid grid-cols-2 md:grid-cols-3 gap-3">';
        cats.forEach(c => {
            const top = db.filter(p => p.categorie === c && p.ratio).sort((a,b) => a.ratio - b.ratio)[0];
            if (!top) return;
            html += `
            <div class="gold rounded-xl p-3 flex gap-3 cursor-pointer card" onclick='selectVS(${JSON.stringify(top)})'>
                <img src="${top.image}" class="h-14 w-14 object-contain bg-white rounded-lg flex-shrink-0" onerror="this.src='https://placehold.co/56x56?text=?'">
                <div class="min-w-0 flex-1">
                    <span class="pill badge-${c}">${EMOJIS[c]||''} ${c}</span>
                    <div class="text-[10px] font-bold leading-tight mt-1 text-white line-clamp-2">${top.nom}</div>
                    <div class="text-lg font-black text-green-400 leading-none mt-1">${top.ratio}€<span class="text-[8px] text-gray-500 font-normal">/L pur</span></div>
                    <div class="text-[9px] text-gray-500">${top.prix_eur ?? '—'}€ · ${top.volume_L ?? '—'}L · ${top.degre_pct ?? '—'}%</div>
                </div>
            </div>`;
        });
        html += '</div>';
        pods.innerHTML = html;
    }

    // Grille
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    list.slice(0, 300).forEach(p => {
        const card = document.createElement('div');
        card.className = "card bg-slate-900 rounded-xl overflow-hidden border border-slate-800 cursor-pointer";
        card.onclick = () => selectVS(p);
       const ratioHtml = p.ratio
    ? `<div class="text-base font-black text-green-400 leading-none">${p.ratio}€</div>
       <div class="text-[7px] ${p.ratio_estime ? 'text-orange-500' : 'text-gray-600'}">/L alc. pur${p.ratio_estime ? ' ~' : ''}</div>`
    : `<div class="text-xs text-gray-600 italic">ratio N/A</div>`;
        const subLabel = p.categorie === 'spiritueux'
            ? `<span class="pill badge-spiritueux">${SOUS_EMOJIS[getSousCategorie(p.nom)]} ${getSousCategorie(p.nom)}</span>`
            : `<span class="pill badge-${p.categorie}">${EMOJIS[p.categorie]||''} ${p.categorie}</span>`;
        card.innerHTML = `
            <img src="${p.image}" class="w-full h-28 object-contain bg-white p-2" onerror="this.src='https://placehold.co/200x112?text=?'">
            <div class="p-2.5">
                ${subLabel}
                <div class="text-[9px] font-bold overflow-hidden leading-tight text-white mt-1 mb-2" style="height:2.4em">${p.nom}</div>
                <div class="flex justify-between items-end">
                    <div>${ratioHtml}</div>
                    <div class="text-right">
                        <div class="text-xs font-black text-gray-300">${p.prix_eur ?? '—'}€</div>
                        <div class="text-[8px] text-gray-600">${p.degre_pct ?? '—'}% · ${p.volume_L ?? '—'}L</div>
                    </div>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

function selectVS(p) {
    if (vsSelection.length >= 2) vsSelection = [];
    vsSelection.push(p);
    document.getElementById('vs-bar').classList.remove('hidden');
    document.getElementById('vs1-name').innerText = vsSelection[0].nom;
    document.getElementById('vs1-ratio').innerText = vsSelection[0].ratio ? vsSelection[0].ratio + '€/L' : '—';
    if (vsSelection.length === 2) {
        document.getElementById('vs2-name').innerText = vsSelection[1].nom;
        document.getElementById('vs2-ratio').innerText = vsSelection[1].ratio ? vsSelection[1].ratio + '€/L' : '—';
        if (vsSelection[0].ratio && vsSelection[1].ratio) {
            const best = vsSelection[0].ratio < vsSelection[1].ratio ? vsSelection[0] : vsSelection[1];
            const diff = Math.abs(vsSelection[0].ratio - vsSelection[1].ratio).toFixed(2);
            document.getElementById('vs-winner').innerText = '🏆 GAGNANT : ' + best.nom.substring(0,30) + '... (économie : ' + diff + '€/L)';
        } else {
            document.getElementById('vs-winner').innerText = '⚠️ Ratio manquant sur un des produits';
        }
    } else {
        document.getElementById('vs2-name').innerText = '—';
        document.getElementById('vs2-ratio').innerText = '—';
        document.getElementById('vs-winner').innerText = 'Sélectionnez un 2ème produit en cliquant sur une carte';
    }
}

function resetVS() {
    vsSelection = [];
    document.getElementById('vs-bar').classList.add('hidden');
}
</script>
</body>
</html>
