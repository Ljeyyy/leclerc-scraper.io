name: Scrape & Deploy AlcoScore

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests pandas

      - run: python scraper.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Mise à jour automatique des données"
          file_pattern: alcools.json
