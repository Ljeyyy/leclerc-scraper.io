name: Scrape & Deploy AlcoScore

on:
  schedule:
    - cron: '0 6 * * 1'  # Chaque lundi à 6h du matin
  workflow_dispatch:       # Permet aussi de lancer manuellement

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests pandas

      - name: Lancer le scraper
        run: python scraper.py

      - name: Commit et push alcools.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add alcools.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour automatique des données"
          git push
